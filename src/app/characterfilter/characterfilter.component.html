<section class="page">
  <mat-toolbar class="section-bar">Harry Potter Characters Filter</mat-toolbar>

  <div class="controls">
    <mat-form-field appearance="fill" class="house-field" subscriptSizing="dynamic">
      <mat-label>House</mat-label>
      <mat-select
        [(ngModel)]="selectedHouse"
        (selectionChange)="load()"
        panelClass="house-panel"
      >
        @for (h of houses; track h) {
          <mat-option [value]="h">{{ h }}</mat-option>
        }
      </mat-select>
    </mat-form-field>
  </div>

  @if (loading) {
    <div class="state state--center">
      <mat-progress-spinner diameter="48" mode="indeterminate" />
    </div>
  } @else if (error) {
    <p class="state state--error">{{ error }}</p>
  } @else {
    <div class="card-grid">
      @for (c of characters; track c.id) {
        <mat-card
          class="hp-card"
          role="button"
          tabindex="0"
          (click)="goToDetails(c)"
          (keyup.enter)="goToDetails(c)"
        >
          <img mat-card-image class="hp-card__img" [src]="c.image" [alt]="c.name" loading="lazy" />
          <mat-card-content class="hp-card__body">
            <h3 class="hp-card__name">{{ c.name }}</h3>
            <p class="hp-card__actor">Actor: {{ c.actor || '—' }}</p>
            <p class="hp-card__house" [style.color]="houseColor(c.house)">{{ c.house || '—' }}</p>
          </mat-card-content>
        </mat-card>
      }
    </div>
  }
</section>
